<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KELVIN DRIVE · 跨设备同步云盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, 'Segoe UI', 'Poppins', sans-serif;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #030711, #000000);
            min-height: 100vh;
            color: #eef5ff;
        }
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,0,0,0.2) 2px, transparent 3px);
            pointer-events: none;
            z-index: 0;
        }
        .glass-panel {
            background: rgba(8, 18, 32, 0.75);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 32px;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px;
            position: relative;
            z-index: 2;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: rgba(10, 20, 35, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.6);
            border-radius: 48px;
            padding: 40px 32px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }
        .modal-card h2 {
            font-size: 2rem;
            background: linear-gradient(135deg, #aaffff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
        }
        .modal-card input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid cyan;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }
        .modal-card button {
            background: linear-gradient(95deg, #0ff0c0, #0a6eff);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        .error-msg { color: #ff8a9e; margin-top: 12px; font-size: 0.8rem; }
        .main-content { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
        .logo h1 { font-size: 1.8rem; background: linear-gradient(135deg, #aaffff, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .badge { background: rgba(0,255,255,0.15); padding: 6px 16px; border-radius: 40px; font-size: 0.75rem; border: 1px solid cyan; }
        .drive-layout { display: flex; gap: 24px; flex-wrap: wrap; }
        .sidebar { flex: 1.2; min-width: 260px; background: rgba(8,18,32,0.7); border-radius: 32px; padding: 20px 14px; border: 1px solid rgba(0,210,255,0.35); height: fit-content; }
        .main-area { flex: 4; min-width: 280px; }
        .folder-header { font-weight: 600; margin-bottom: 18px; display: flex; justify-content: space-between; color: #9ceeff; }
        .folder-scroll { max-height: 65vh; overflow-y: auto; }
        .folder-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; margin: 4px 0; border-radius: 16px; cursor: pointer; background: rgba(20,40,65,0.3); border: 1px solid transparent; }
        .folder-item:hover { background: rgba(0,180,220,0.2); border-color: cyan; }
        .folder-active { background: rgba(0,180,230,0.25); border-left: 3px solid #0ff; }
        .folder-name { display: flex; gap: 8px; flex: 1; cursor: pointer; }
        .del-folder { background: rgba(255,60,80,0.25); border: none; color: #ff98aa; border-radius: 30px; padding: 4px 12px; cursor: pointer; font-size: 0.7rem; }
        .new-folder-btn { margin-top: 24px; background: rgba(0,255,255,0.1); border: 1px dashed cyan; border-radius: 40px; padding: 10px; text-align: center; cursor: pointer; }
        .child-indent { margin-left: 28px; border-left: 1px solid rgba(0,200,255,0.3); padding-left: 6px; }
        .upload-card { background: rgba(8,18,32,0.7); border-radius: 28px; padding: 20px 24px; margin-bottom: 28px; border: 1px solid rgba(0,210,255,0.4); }
        .dropzone { border: 2px dashed rgba(0,255,255,0.6); border-radius: 24px; padding: 28px 16px; text-align: center; cursor: pointer; background: rgba(0,10,25,0.5); transition: 0.2s; }
        .dropzone.drag-over { background: rgba(0,200,255,0.15); border-color: cyan; }
        .upload-btn { background: linear-gradient(95deg, #0ff0c0, #0a6eff); border: none; padding: 10px 28px; border-radius: 40px; font-weight: bold; float: right; margin-top: 18px; cursor: pointer; }
        .selected-preview { background: #0a1f2fe0; border-radius: 40px; padding: 6px 18px; display: inline-block; margin-top: 12px; font-size: 0.8rem; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .file-card { background: rgba(15,25,45,0.75); border-radius: 24px; padding: 16px; border: 1px solid rgba(0,255,255,0.2); transition: 0.2s; }
        .file-card:hover { transform: translateY(-3px); border-color: cyan; }
        .file-icon { font-size: 2.5rem; }
        .file-name { font-weight: 600; word-break: break-word; font-size: 0.9rem; }
        .file-meta { font-size: 0.7rem; color: #9bbae0; margin: 8px 0; }
        .file-actions { display: flex; gap: 12px; margin-top: 12px; }
        .btn-download, .btn-delete-file { font-size: 0.7rem; padding: 5px 12px; border-radius: 30px; border: none; cursor: pointer; }
        .btn-download { background: #0e6ba8; color: white; }
        .btn-delete-file { background: #a12a3e; color: white; }
        .empty-area { grid-column: 1 / -1; text-align: center; padding: 60px; color: #8db5ff; }
        footer { margin-top: 40px; text-align: center; font-size: 0.7rem; color: #5f8ab6; }
        .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #0a1f2fdd; backdrop-filter: blur(20px); border: 1px solid cyan; color: cyan; padding: 10px 28px; border-radius: 60px; z-index: 2000; font-size: 0.85rem; }
        @media (max-width: 768px) { .app-container { padding: 12px; } .sidebar { min-width: 220px; } }
    </style>
</head>
<body>
<div class="matrix-bg"></div>

<div id="passwordModal" class="modal">
    <div class="modal-card">
        <h2>⚡ KELVIN DRIVE</h2>
        <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
        <button id="unlockBtn">UNLOCK</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="mainApp" class="main-content">
    <div class="app-container">
        <div class="header glass-panel">
            <div class="logo"><h1>📁 KELVIN DRIVE</h1></div>
            <div class="badge">🌐 实时同步 · 多设备共享 · 支持多选文件</div>
        </div>
        <div class="drive-layout">
            <div class="sidebar glass-panel">
                <div class="folder-header"><span>📂 文件夹</span><span>可删除任意</span></div>
                <div class="folder-scroll" id="folderTreeContainer"></div>
                <div id="newFolderAction" class="new-folder-btn">+ 新建文件夹 (在当前文件夹内)</div>
                <div style="margin-top: 18px; font-size:0.7rem; color:#6fbbff;">✨ 支持多选文件上传 · 拖拽上传 · 跨设备秒同步</div>
            </div>
            <div class="main-area">
                <div class="upload-card glass-panel">
                    <div id="dropZone" class="dropzone">
                        📤 拖拽文件至此区域 或 点击选择文件 (支持多选 Ctrl/Cmd + 点击)
                        <input type="file" id="fileInput" multiple style="display: none;">
                    </div>
                    <div id="selectedPreview"></div>
                    <button id="uploadBtn" class="upload-btn">🚀 上传到当前文件夹</button>
                </div>
                <div id="fileGridContainer" class="file-grid">
                    <div class="empty-area">✨ 加载中...</div>
                </div>
            </div>
        </div>
        <footer>🔐 密码保护 · 所有设备实时同步 · 上传后立刻出现在其他设备</footer>
    </div>
</div>
<div id="toastMessage" class="toast" style="opacity:0; visibility:hidden;"></div>

<script>
    // Supabase 配置
    const SUPABASE_URL = "https://sjhflafczaeikazgdmsm.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ljRPWsEE4O_qTvlqrHalIA_JLvJ6WLY";

    let supabaseClient = null;
    let currentFolderId = "root";
    let realtimeChannel = null;

    async function loadSupabase() {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            script.onload = () => {
                const { createClient } = window.supabase;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                resolve();
            };
            document.head.appendChild(script);
        });
    }

    async function checkPassword(input) {
        try {
            const { data, error } = await supabaseClient.from('app_config').select('value').eq('key', 'password').maybeSingle();
            if (error || !data) return input === "0000";
            return input === data.value;
        } catch(e) {
            return input === "0000";
        }
    }

    async function loadFolders() {
        try {
            const { data, error } = await supabaseClient.from('folders').select('*');
            if (error) return [];
            return data || [];
        } catch(e) { return []; }
    }

    async function loadFiles() {
        try {
            const { data, error } = await supabaseClient.from('files').select('*');
            if (error) return [];
            return data || [];
        } catch(e) { return []; }
    }

    async function uploadFile(file, folderId) {
        const safeName = file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
        const fileId = `${Date.now()}_${safeName}`;
        const filePath = `${folderId}/${fileId}`;
        
        console.log("开始上传:", file.name);
        
        // 1. 上传到 Storage
        const { error: uploadError } = await supabaseClient.storage.from('drive').upload(filePath, file, {
            cacheControl: '3600',
            upsert: false
        });
        if (uploadError) {
            console.error("Storage上传错误:", uploadError);
            throw new Error(`存储上传失败: ${uploadError.message}`);
        }
        
        // 2. 获取公开 URL
        const { data: urlData } = supabaseClient.storage.from('drive').getPublicUrl(filePath);
        
        // 3. 在 files 表中创建记录
        const { error: insertError } = await supabaseClient.from('files').insert({
            id: fileId,
            name: file.name,
            folder_id: folderId,
            size: file.size,
            type: file.type || 'application/octet-stream',
            created_at: Date.now(),
            file_url: urlData.publicUrl
        });
        
        if (insertError) {
            console.error("数据库插入错误:", insertError);
            throw new Error(`数据库写入失败: ${insertError.message}`);
        }
        
        console.log("上传成功:", file.name);
        return true;
    }

    async function deleteFile(fileId, fileUrl) {
        try {
            const pathPart = fileUrl.split('/').slice(-2).join('/');
            await supabaseClient.storage.from('drive').remove([pathPart]);
        } catch(e) { console.warn('Storage delete error:', e); }
        await supabaseClient.from('files').delete().eq('id', fileId);
    }

    async function createFolder(name, parentId) {
        if (!name || !name.trim()) return false;
        
        const folderName = name.trim();
        const existingFolders = await loadFolders();
        const exists = existingFolders.some(f => f.parent_id === parentId && f.name === folderName);
        if (exists) {
            showToast("同名文件夹已存在", 1500);
            return false;
        }
        
        const folderId = `folder_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
        
        try {
            const { error } = await supabaseClient.from('folders').insert({
                id: folderId,
                name: folderName,
                parent_id: parentId,
                path: '/',
                created_at: Date.now()
            });
            
            if (error) {
                console.error('创建文件夹错误:', error);
                showToast("创建失败: " + (error.message || "未知错误"), 2000);
                return false;
            }
            return folderId;
        } catch(e) {
            console.error('创建文件夹异常:', e);
            showToast("创建失败，请检查 Supabase RLS 设置", 2000);
            return false;
        }
    }

    async function deleteFolder(folderId) {
        const files = await loadFiles();
        const filesToDelete = files.filter(f => f.folder_id === folderId);
        for (let file of filesToDelete) {
            await deleteFile(file.id, file.file_url);
        }
        await supabaseClient.from('folders').delete().eq('id', folderId);
    }

    async function renderUI() {
        const [folders, files] = await Promise.all([loadFolders(), loadFiles()]);
        
        const container = document.getElementById('fileGridContainer');
        const filteredFiles = files.filter(f => f.folder_id === currentFolderId);
        
        if (filteredFiles.length === 0) {
            container.innerHTML = '<div class="empty-area">✨ 空文件夹 · 上传文件后会自动同步到所有设备</div>';
        } else {
            let html = '';
            for (let f of filteredFiles) {
                let icon = '📄';
                if (f.type && f.type.includes('pdf')) icon = '📘';
                else if (f.type && f.type.includes('image')) icon = '🖼️';
                else if (f.name && f.name.match(/\.(zip|rar|7z)$/i)) icon = '🗜️';
                const sizeStr = formatBytes(f.size || 0);
                const dateStr = f.created_at ? new Date(f.created_at).toLocaleString() : '未知';
                html += `<div class="file-card">
                            <div class="file-icon">${icon}</div>
                            <div class="file-name" title="${escapeHtml(f.name || '未命名')}">${escapeHtml(truncateStr(f.name || '未命名', 40))}</div>
                            <div class="file-meta">${sizeStr} · ${dateStr}</div>
                            <div class="file-actions">
                                <button class="btn-download" data-url="${f.file_url || ''}" data-name="${escapeHtml(f.name || '下载')}">⬇️ 下载</button>
                                <button class="btn-delete-file" data-id="${f.id}" data-url="${f.file_url || ''}">🗑️ 删除</button>
                            </div>
                        </div>`;
            }
            container.innerHTML = html;
            
            document.querySelectorAll('.btn-download').forEach(btn => {
                btn.addEventListener('click', () => {
                    const url = btn.dataset.url;
                    if (url) window.open(url, '_blank');
                    else showToast("文件链接无效", 1000);
                });
            });
            document.querySelectorAll('.btn-delete-file').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (confirm("永久删除此文件？所有设备将无法再看到它。")) {
                        await deleteFile(btn.dataset.id, btn.dataset.url);
                        await renderUI();
                        showToast("文件已删除 (已同步所有设备)", 1500);
                    }
                });
            });
        }
        
        const folderContainer = document.getElementById('folderTreeContainer');
        const buildTree = (parentId) => {
            return folders.filter(f => f.parent_id === parentId).map(f => ({
                ...f,
                children: buildTree(f.id)
            }));
        };
        const tree = buildTree('root');
        
        function renderTree(nodes) {
            if (!nodes.length) return '';
            let html = '<ul style="list-style:none; padding-left:0;">';
            for (let node of nodes) {
                const isActive = node.id === currentFolderId;
                const canDelete = node.id !== 'root' && node.id !== 'kelvin_folder';
                html += `<li style="margin-bottom: 4px;">
                            <div class="folder-item ${isActive ? 'folder-active' : ''}" data-id="${node.id}">
                                <div class="folder-name" data-id="${node.id}">
                                    <span>📁</span>
                                    <span>${escapeHtml(node.name || '未命名')}</span>
                                </div>
                                ${canDelete ? `<button class="del-folder" data-id="${node.id}" data-name="${escapeHtml(node.name || '')}">🗑️</button>` : ''}
                            </div>`;
                if (node.children && node.children.length) {
                    html += `<div class="child-indent">${renderTree(node.children)}</div>`;
                }
                html += `</li>`;
            }
            html += `</ul>`;
            return html;
        }
        folderContainer.innerHTML = renderTree(tree);
        
        document.querySelectorAll('.folder-name, .folder-item').forEach(el => {
            const fid = el.getAttribute('data-id');
            if (fid) {
                el.addEventListener('click', (e) => {
                    if (e.target.classList && e.target.classList.contains('del-folder')) return;
                    currentFolderId = fid;
                    renderUI();
                });
            }
        });
        
        document.querySelectorAll('.del-folder').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const fid = btn.dataset.id;
                const fname = btn.dataset.name;
                if (confirm(`⚠️ 删除文件夹「${fname}」及其所有内容？此操作不可逆，且会同步到所有设备。`)) {
                    await deleteFolder(fid);
                    if (currentFolderId === fid) currentFolderId = 'root';
                    await renderUI();
                    showToast(`已删除: ${fname}`, 1500);
                }
            });
        });
    }

    async function initMainApp() {
        await renderUI();
        
        if (realtimeChannel) {
            try { await supabaseClient.removeChannel(realtimeChannel); } catch(e) {}
        }
        realtimeChannel = supabaseClient.channel('db-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'files' }, () => renderUI())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'folders' }, () => renderUI())
            .subscribe();
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const selectedPreview = document.getElementById('selectedPreview');
        
        function updatePreview(files) {
            if (!files || files.length === 0) { 
                selectedPreview.innerHTML = ''; 
                return; 
            }
            const fileNames = Array.from(files).map(f => f.name).slice(0, 3).join(', ');
            const more = files.length > 3 ? ` 等${files.length}个文件` : '';
            selectedPreview.innerHTML = `<span class="selected-preview">✨ 已选择 ${files.length} 个文件: ${fileNames}${more}</span>`;
        }
        
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files);
            if (files.length) {
                updatePreview(files);
                let success = 0;
                let errors = [];
                for (let file of files) {
                    try {
                        showToast(`上传中: ${file.name}`, 800);
                        await uploadFile(file, currentFolderId);
                        success++;
                    } catch(err) {
                        console.error(err);
                        errors.push(`${file.name}: ${err.message}`);
                    }
                }
                if (success > 0) {
                    showToast(`✅ 成功上传 ${success} 个文件，已同步到所有设备`, 2500);
                }
                if (errors.length > 0) {
                    showToast(`❌ 失败: ${errors[0]}`, 4000);
                }
                updatePreview([]);
                await renderUI();
            }
        });
        
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length) {
                updatePreview(files);
                let success = 0;
                let errors = [];
                for (let file of files) {
                    try {
                        await uploadFile(file, currentFolderId);
                        success++;
                    } catch(err) {
                        console.error(err);
                        errors.push(`${file.name}: ${err.message}`);
                    }
                }
                if (success > 0) {
                    showToast(`✅ 成功上传 ${success} 个文件，已同步到所有设备`, 2500);
                }
                if (errors.length > 0) {
                    showToast(`❌ 失败: ${errors[0]}`, 4000);
                }
                updatePreview([]);
                await renderUI();
                fileInput.value = '';
            }
        });
        
        document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());
        
        const newFolderBtn = document.getElementById('newFolderAction');
        if (newFolderBtn) {
            const freshBtn = newFolderBtn.cloneNode(true);
            newFolderBtn.parentNode.replaceChild(freshBtn, newFolderBtn);
            freshBtn.addEventListener('click', async () => {
                let name = prompt("请输入新文件夹名称:", "新文件夹");
                if (name && name.trim()) {
                    const result = await createFolder(name.trim(), currentFolderId);
                    if (result) {
                        await renderUI();
                        showToast(`✅ 文件夹「${name}」已创建`, 1500);
                    }
                }
            });
        }
    }

    async function unlockApp() {
        const input = document.getElementById('passwordInput').value;
        if (await checkPassword(input)) {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            await initMainApp();
            showToast("🔓 解锁成功 · 跨设备实时同步已激活", 3000);
        } else {
            document.getElementById('loginError').innerText = "密码错误";
        }
    }

    async function bootstrap() {
        await loadSupabase();
        
        try {
            const { error } = await supabaseClient.from('folders').select('id').limit(1);
            if (error && error.message && error.message.includes('relation')) {
                document.getElementById('loginError').innerHTML = "⚠️ 数据库未就绪，请在 Supabase SQL Editor 中执行建表语句";
                return;
            }
        } catch(e) {
            document.getElementById('loginError').innerHTML = "⚠️ 连接失败，请检查 Supabase 配置";
            return;
        }
        
        document.getElementById('unlockBtn').addEventListener('click', unlockApp);
        document.getElementById('passwordInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') unlockApp(); });
    }
    
    function showToast(msg, dur = 2000) {
        const toast = document.getElementById('toastMessage');
        toast.innerText = msg;
        toast.style.visibility = 'visible';
        toast.style.opacity = '1';
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.style.visibility = 'hidden', 300);
        }, dur);
    }
    
    function formatBytes(b) { 
        if (!b || b === 0) return '0 B'; 
        if (b < 1024) return b + ' B'; 
        if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; 
        return (b / 1048576).toFixed(1) + ' MB'; 
    }
    
    function escapeHtml(s) { 
        if (!s) return ''; 
        return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
    }
    
    function truncateStr(s, l) { 
        if (!s) return ''; 
        if (s.length <= l) return s; 
        return s.slice(0, l - 2) + '..'; 
    }
    
    bootstrap();
</script>
